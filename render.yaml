services:
  - type: web
    name: un-diavolo-per-capello
    runtime: static
    buildCommand: ""
    staticPublishPath: ./
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /images/*
        name: Cache-Control
        value: public, max-age=86400, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
